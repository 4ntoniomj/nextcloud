upstream php-handler {
    # Aquí NGINX se conecta al contenedor 'nextcloud' por el puerto 9000
    server nextcloud:9000;
}

server {
    listen 80;
    server_name _;

    # El volumen que compartiste entre ambos contenedores
    root /var/www/html;
    index index.php index.html index.htm;

    # Encabezados de seguridad críticos
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Robots-Tag none;
    add_header X-Download-Options noopen;
    add_header X-Permitted-Cross-Domain-Policies none;
    add_header Referrer-Policy no-referrer;

    client_max_body_size 512M;
    fastcgi_buffers 64 4K;

    # Redirecciones para CalDAV/CardDAV
    location = /.well-known/carddav { return 301 $scheme://$host/remote.php/dav; }
    location = /.well-known/caldav  { return 301 $scheme://$host/remote.php/dav; }

    location / {
        rewrite ^ /index.php;
    }

    # Bloquear acceso a carpetas sensibles
    location ~ ^\/(?:build|tests|config|lib|3rdparty|templates|data)\/ {
        deny all;
    }
    location ~ ^\/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }

    # Procesamiento de PHP a través de FastCGI
    location ~ ^\/(?:index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|oc[ms]-provider\/.+)\.php(?:$|\/) {
        fastcgi_split_path_info ^(.+?\.php)(\/.*|)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        # Si usas un proxy inverso SSL delante, cambia off a on
        fastcgi_param HTTPS off;
        fastcgi_read_timeout 300;
        fastcgi_pass php-handler;
    }

    # Caché de archivos estáticos
    location ~ \.(?:css|js|woff2?|svg|gif|map|png|html|ttf|ico|jpg|jpeg|bcmap|mp4|webm)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463";
        access_log off;
    }
}
